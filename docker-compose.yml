services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elodemo
      POSTGRES_USER: elodemo
      POSTGRES_PASSWORD: elodemo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elodemo"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/elodemo
      SPRING_DATASOURCE_USERNAME: elodemo
      SPRING_DATASOURCE_PASSWORD: elodemo
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
